{% extends "base.html" %}

{% block content %}

<a class="btn-add" href="/add">+ Add New Task</a>

<table>
    <tr>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>

    {% for task in tasks %}
    <tr class="{{ task.status }}">
        <td>{{ task.title }}</td>

        <td>
            <form action="/update_priority/{{ task._id }}" method="POST">
                <select name="priority" onchange="this.form.submit()">
                    <option value="High" {% if task.priority == "High" %}selected{% endif %}>High</option>
                    <option value="Medium" {% if task.priority == "Medium" %}selected{% endif %}>Medium</option>
                    <option value="Low" {% if task.priority == "Low" %}selected{% endif %}>Low</option>
                </select>
            </form>
        </td>

        <td>
            <a class="status-btn" href="/toggle/{{ task._id }}">
                {{ task.status }}
            </a>
        </td>

        <td>
            <a class="delete-btn" href="/delete/{{ task._id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
